<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORUS GENESIS CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { font-family: 'Share Tech Mono', monospace; background-color: #020408; color: #94a3b8; }
        .glow-text { text-shadow: 0 0 10px rgba(219, 39, 119, 0.7); }
        .node-active { border-color: #4f46e5 !important; background-color: rgba(79, 70, 229, 0.3) !important; color: white !important; box-shadow: 0 0 15px rgba(79, 70, 229, 0.5); }
        
        #mobile-ui { display: none; }
        @media (max-width: 768px) {
            #pc-ui { display: none; }
            #mobile-ui { display: flex; }
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div id="pc-ui" class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-slate-900 pb-4">
            <h1 class="text-3xl font-black italic text-pink-600 glow-text">TORUS <span class="text-white">GENESIS</span> <span class="text-indigo-500 text-sm tracking-widest ml-1">CORE</span></h1>
            <div class="flex gap-2 text-[10px]">
                <span id="tunnel-status" class="bg-blue-900/20 text-blue-400 border border-blue-800/50 px-2 py-1 rounded">TUNNEL: LISTENING</span>
            </div>
        </header>

        <main class="grid grid-cols-12 gap-6">
            <div class="col-span-9 space-y-6">
                <section class="border border-slate-800 bg-slate-950/40 p-6 rounded-2xl">
                    <div class="flex justify-between items-center mb-6 text-[10px] text-slate-500 uppercase tracking-[0.4em]">Torus Core Pipeline</div>
                    <div class="grid grid-cols-4 gap-4">
                        <div class="h-28 border border-slate-800/50 rounded-xl bg-black/40 flex items-center justify-center text-[10px] text-slate-700 uppercase italic">Link_A</div>
                        <div class="h-28 border border-slate-800/50 rounded-xl bg-black/40 flex items-center justify-center text-[10px] text-slate-700 uppercase italic">Link_B</div>
                        <div class="h-28 border border-slate-800/50 rounded-xl bg-black/40 flex items-center justify-center text-[10px] text-slate-700 uppercase italic">Buffer_1</div>
                        <div class="h-28 border border-slate-800/50 rounded-xl bg-black/40 flex items-center justify-center text-[10px] text-slate-700 uppercase italic">Buffer_2</div>
                    </div>
                </section>
                <section id="grid-container" class="grid grid-cols-8 gap-2"></section>
            </div>

            <div class="col-span-3 space-y-6">
                <aside class="border border-slate-800 bg-slate-950/40 rounded-2xl p-4 h-96 flex flex-col">
                    <div class="text-[10px] font-bold uppercase border-b border-slate-800 pb-2 mb-2 text-indigo-400">Gateway Monitor</div>
                    <div id="pc-log" class="flex-grow font-mono text-[9px] overflow-y-auto text-slate-500 space-y-1">
                        <p class="text-green-500">>> CORE_SYSTEM: LISTENING FOR REMOTE SIGNAL...</p>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <div id="mobile-ui" class="fixed inset-0 bg-slate-950 flex-col items-center justify-center p-6">
        <div class="w-full max-w-xs p-6 border border-indigo-500/30 rounded-3xl text-center mb-10">
            <h2 class="text-indigo-400 font-bold tracking-[0.5em] text-xs">SIGNAL TRANSMITTER</h2>
        </div>
        <button onclick="sendTunnelSignal()" class="w-full py-16 bg-indigo-600 text-white font-black text-2xl rounded-[40px] shadow-[0_0_50px_rgba(79,70,229,0.4)] active:scale-95 transition-all">
            IGNITE
        </button>
    </div>

    <script>
        const container = document.getElementById('grid-container');
        const rows = ['A','B','C','D','E','F','G','H'];
        const nodes = [];
        rows.forEach(r => {
            for(let c=1; c<=8; c++) {
                const b = document.createElement('div');
                const id = r + c;
                b.id = 'node-' + id;
                b.className = 'h-10 border border-slate-900 bg-slate-950 text-slate-800 text-[10px] rounded flex items-center justify-center transition-all duration-300';
                b.textContent = id;
                container.appendChild(b);
                nodes.push(id);
            }
        });

        function sendTunnelSignal() {
            // この関数がPC側のブラウザインスタンスで実行された際の挙動
            if(window.innerWidth > 768) {
                const status = document.getElementById('tunnel-status');
                const log = document.getElementById('pc-log');
                status.textContent = 'TUNNEL: ONLINE';
                status.className = 'bg-green-900/20 text-green-400 border border-green-800/50 px-2 py-1 rounded font-bold';
                
                let i = 0;
                const seq = setInterval(() => {
                    if(i < nodes.length) {
                        document.getElementById('node-' + nodes[i]).classList.add('node-active');
                        const p = document.createElement('p');
                        p.className = 'text-indigo-500';
                        p.textContent = `>> NODE_${nodes[i]}: SYNCED`;
                        log.appendChild(p);
                        log.scrollTop = log.scrollHeight;
                        i++;
                    } else {
                        clearInterval(seq);
                        const p = document.createElement('p');
                        p.className = 'text-white glow-text mt-2';
                        p.textContent = `>> CORE TUNNELING COMPLETE.`;
                        log.appendChild(p);
                    }
                }, 20);
            } else {
                alert("SIGNAL TRANSMITTED.");
            }
        }
    </script>
</body>
</html>
