<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORUS GENESIS CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { font-family: 'Share Tech Mono', monospace; background-color: #020408; color: #94a3b8; overflow: hidden; }
        .glow-text { text-shadow: 0 0 10px rgba(219, 39, 119, 0.7); }
        .glow-green { text-shadow: 0 0 10px rgba(34, 197, 94, 0.7); box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
        .glow-red { text-shadow: 0 0 10px rgba(239, 68, 68, 0.7); box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
        .tunneling { color: #4f46e5; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
    <header class="flex flex-wrap justify-between items-center mb-8 border-b border-slate-900 pb-4 gap-4">
        <div class="flex items-center gap-6">
            <h1 class="text-3xl font-black italic tracking-tighter text-pink-600 glow-text">TORUS <span class="text-white">GENESIS</span> <span class="text-indigo-500 text-sm tracking-widest ml-1 text-white">CORE</span></h1>
            <div class="hidden md:flex gap-2 text-[10px]">
                <span class="bg-blue-900/20 text-blue-400 border border-blue-800/50 px-2 py-1 rounded uppercase">Tunnel: <span id="tunnel-status">Inactive</span></span>
                <span class="bg-green-900/20 text-green-400 border border-green-800/50 px-2 py-1 rounded animate-pulse">CORE: READY</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-xs text-slate-600 border border-slate-800 px-3 py-1 rounded-full bg-black italic">https://torus-genesis-core.vercel.app</span>
        </div>
    </header>

    <main class="grid grid-cols-12 gap-6">
        <div class="col-span-12 lg:col-span-9 space-y-6">
            <section class="border border-slate-800 bg-slate-950/40 p-6 rounded-2xl">
                <div class="flex justify-between items-center mb-6 text-[10px] tracking-[0.4em] font-bold text-slate-500 uppercase">
                    Torus Core Pipeline
                    <div id="sync-bar" class="w-48 h-1 bg-slate-900 rounded-full overflow-hidden"><div id="progress" class="w-0 h-full bg-indigo-500 transition-all duration-1000"></div></div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="h-28 border border-slate-800/50 rounded-xl bg-black/40 flex flex-col items-center justify-center">
                        <span class="text-[10px] text-slate-700 uppercase">Link_A</span>
                    </div>
                    <div class="h-28 border border-slate-800/50 rounded-xl bg-black/40 flex flex-col items-center justify-center">
                        <span class="text-[10px] text-slate-700 uppercase">Link_B</span>
                    </div>
                    <div class="h-28 border border-slate-800/50 rounded-xl bg-black/40 flex flex-col items-center justify-center">
                        <span class="text-[10px] text-slate-700 uppercase">Buffer_1</span>
                    </div>
                    <div class="h-28 border border-slate-800/50 rounded-xl bg-black/40 flex flex-col items-center justify-center">
                        <span class="text-[10px] text-slate-700 uppercase">Buffer_2</span>
                    </div>
                </div>
            </section>
            <section id="grid-container" class="grid grid-cols-4 md:grid-cols-8 gap-2"></section>
        </div>

        <div class="col-span-12 lg:col-span-3 space-y-6">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="startTunnel()" class="py-4 bg-green-950/30 border border-green-500/50 text-green-500 text-[10px] font-bold rounded-xl glow-green hover:bg-green-500 hover:text-white transition-all">START SYSTEM</button>
                <button onclick="location.reload()" class="py-4 bg-red-950/30 border border-red-500/50 text-red-500 text-[10px] font-bold rounded-xl glow-red hover:bg-red-500 hover:text-white transition-all">RESET CORE</button>
            </div>
            <aside class="border border-slate-800 bg-slate-950/40 rounded-2xl p-4 h-80 flex flex-col">
                <div class="text-[10px] font-bold uppercase border-b border-slate-800 pb-2 mb-2 text-indigo-400">Gateway Monitor</div>
                <div id="console" class="flex-grow font-mono text-[9px] overflow-y-auto text-slate-500 space-y-1">
                    <p class="text-green-500">>> STANDBY. WAITING FOR START COMMAND.</p>
                </div>
            </aside>
        </div>
    </main>

    <script>
        const consoleEl = document.getElementById('console');
        const progress = document.getElementById('progress');
        const tunnelStatus = document.getElementById('tunnel-status');

        function addLog(text, color = 'text-slate-500') {
            const p = document.createElement('p');
            p.className = color;
            p.textContent = `>> ${text}`;
            consoleEl.appendChild(p);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function startTunnel() {
            addLog('INITIALIZING TUNNEL PROTOCOL...', 'text-indigo-400');
            tunnelStatus.textContent = 'Connecting...';
            tunnelStatus.className = 'tunneling';
            
            setTimeout(() => {
                addLog('SEARCHING FOR CORE GATEWAY...', 'text-slate-400');
                progress.style.width = '40%';
            }, 1000);

            setTimeout(() => {
                addLog('ENCRYPTION HANDSHAKE: SUCCESS', 'text-green-500');
                addLog('ESTABLISHING P2P TUNNEL...', 'text-indigo-400');
                progress.style.width = '75%';
            }, 2500);

            setTimeout(() => {
                addLog('TUNNEL OPEN: 127.0.0.1 <-> GENESIS_CORE', 'text-white glow-text');
                addLog('SYSTEM SYNC COMPLETE.', 'text-green-500');
                progress.style.width = '100%';
                tunnelStatus.textContent = 'Online';
                tunnelStatus.className = 'text-green-400 font-bold';
            }, 4500);
        }

        const container = document.getElementById('grid-container');
        const rows = ['A','B','C','D','E','F','G','H'];
        rows.forEach(r => {
            for(let c=1; c<=8; c++) {
                const b = document.createElement('button');
                b.className = 'h-10 border border-slate-900 bg-slate-950 text-slate-800 text-[10px] rounded hover:border-indigo-500 transition-all';
                b.textContent = r + c;
                container.appendChild(b);
            }
        });
    </script>
</body>
</html>
