<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORUS GENESIS CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { font-family: 'Share Tech Mono', monospace; background-color: #020408; color: #94a3b8; }
        .glow-text { text-shadow: 0 0 10px rgba(219, 39, 119, 0.7); }
        .node-active { border-color: #4f46e5 !important; background-color: rgba(79, 70, 229, 0.3) !important; color: white !important; box-shadow: 0 0 15px rgba(79, 70, 229, 0.5); }
        
        /* PCとスマホの切り替え */
        @media (max-width: 768px) {
            #pc-ui { display: none; }
            #mobile-ui { display: flex !important; }
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div id="pc-ui" class="max-w-[1400px] mx-auto">
        <header class="flex justify-between items-center mb-6 border-b border-slate-900 pb-4">
            <h1 class="text-3xl font-black italic text-pink-600 glow-text tracking-tighter">TORUS <span class="text-white">GENESIS</span> <span class="text-indigo-500 text-sm tracking-widest ml-1">CORE</span></h1>
            <div id="tunnel-status" class="bg-blue-900/20 text-blue-400 border border-blue-800/50 px-3 py-1 rounded text-[10px]">TUNNEL: LISTENING</div>
        </header>

        <div class="grid grid-cols-12 gap-6">
            <div class="col-span-9 space-y-6">
                <section class="border border-slate-800 bg-slate-950/40 p-6 rounded-2xl">
                    <div class="text-[10px] text-slate-500 uppercase tracking-[0.4em] mb-4">Torus Core Pipeline</div>
                    <div class="grid grid-cols-4 gap-4">
                        <div class="h-24 border border-slate-800/50 rounded-xl bg-black/40 flex items-center justify-center text-[10px] text-slate-700 uppercase italic">Link_A</div>
                        <div class="h-24 border border-slate-800/50 rounded-xl bg-black/40 flex items-center justify-center text-[10px] text-slate-700 uppercase italic">Link_B</div>
                        <div class="h-24 border border-slate-800/50 rounded-xl bg-black/40 flex items-center justify-center text-[10px] text-slate-700 uppercase italic">Buffer_1</div>
                        <div class="h-24 border border-slate-800/50 rounded-xl bg-black/40 flex items-center justify-center text-[10px] text-slate-700 uppercase italic">Buffer_2</div>
                    </div>
                </section>
                <section id="grid-container" class="grid grid-cols-8 gap-2"></section>
            </div>

            <div class="col-span-3 space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="igniteTunnel()" class="py-3 bg-green-900/20 border border-green-500/50 text-green-500 text-[10px] font-bold rounded-lg hover:bg-green-500 hover:text-white transition-all">START</button>
                    <button onclick="location.reload()" class="py-3 bg-red-900/20 border border-red-500/50 text-red-500 text-[10px] font-bold rounded-lg hover:bg-red-500 hover:text-white transition-all">RESET</button>
                </div>
                <aside class="border border-slate-800 bg-slate-950/40 rounded-2xl p-4 h-96 flex flex-col">
                    <div class="text-[10px] font-bold uppercase border-b border-slate-800 pb-2 mb-2 text-indigo-400">Gateway Monitor</div>
                    <div id="pc-log" class="flex-grow font-mono text-[9px] overflow-y-auto text-slate-500 space-y-1">
                        <p class="text-green-500">>> CORE_SYSTEM: LISTENING...</p>
                    </div>
                </aside>
            </div>
        </div>
    </div>

    <div id="mobile-ui" class="hidden fixed inset-0 bg-slate-950 flex-col items-center justify-center p-6">
        <button onclick="igniteTunnel()" class="w-full py-20 bg-indigo-600 text-white font-black text-3xl rounded-[40px] shadow-[0_0_50px_rgba(79,70,229,0.5)] active:scale-95 transition-all">IGNITE</button>
        <p class="text-indigo-400 mt-8 text-xs tracking-widest uppercase">Signal Transmitter</p>
    </div>

    <script>
        const container = document.getElementById('grid-container');
        const nodes = [];
        const rows = ['A','B','C','D','E','F','G','H'];
        rows.forEach(r => {
            for(let c=1; c<=8; c++) {
                const b = document.createElement('div');
                const id = r + c;
                b.id = 'node-' + id;
                b.className = 'h-10 border border-slate-900 bg-slate-950 text-slate-800 text-[10px] rounded flex items-center justify-center transition-all duration-300';
                b.textContent = id;
                container.appendChild(b);
                nodes.push(id);
            }
        });

        function igniteTunnel() {
            const status = document.getElementById('tunnel-status');
            const log = document.getElementById('pc-log');
            if(!status) return; // スマホ側では何もしない
            
            status.textContent = 'TUNNEL: ONLINE';
            status.className = 'bg-green-900/20 text-green-400 border border-green-800/50 px-3 py-1 rounded text-[10px] font-bold';
            
            let i = 0;
            const seq = setInterval(() => {
                if(i < nodes.length) {
                    const node = document.getElementById('node-' + nodes[i]);
                    if(node) node.classList.add('node-active');
                    const p = document.createElement('p');
                    p.className = 'text-indigo-500';
                    p.textContent = `>> NODE_${nodes[i]}: SYNCED`;
                    log.appendChild(p);
                    log.scrollTop = log.scrollHeight;
                    i++;
                } else {
                    clearInterval(seq);
                    const p = document.createElement('p');
                    p.className = 'text-white glow-text mt-2';
                    p.textContent = `>> TUNNELING COMPLETE.`;
                    log.appendChild(p);
                }
            }, 20);
        }
    </script>
</body>
</html>
