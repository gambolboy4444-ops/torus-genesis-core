<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORUS GENESIS -CORE-</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { font-family: 'Share Tech Mono', monospace; background-color: #020408; color: #94a3b8; overflow-x: hidden; }
        .glow-pink { text-shadow: 0 0 15px rgba(219, 39, 119, 0.8); }
        .glow-blue { text-shadow: 0 0 15px rgba(79, 70, 229, 0.8); }
        .border-glow { border-color: rgba(79, 70, 229, 0.3); box-shadow: 0 0 20px rgba(79, 70, 229, 0.1); }
        .core-pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
        .scanline {
            width: 100%; height: 2px; background: rgba(79, 70, 229, 0.1);
            position: absolute; animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen relative">
    <div class="scanline"></div>

    <header class="flex flex-wrap justify-between items-center mb-8 border-b border-slate-900 pb-4 gap-4 relative z-10">
        <div class="flex items-center gap-6">
            <h1 class="text-3xl font-black italic tracking-tighter text-pink-600 glow-pink">TORUS <span class="text-white">GENESIS</span> <span class="text-indigo-500 text-sm tracking-widest ml-2">[CORE]</span></h1>
            <div class="flex gap-2 text-[10px]">
                <span class="bg-indigo-900/20 text-indigo-400 border border-indigo-800/50 px-2 py-1 rounded">CORE_ENGINE: ACTIVE</span>
                <span id="uptime" class="bg-slate-900/50 text-slate-500 border border-slate-800 px-2 py-1 rounded">UPTIME: 00:00:00</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right hidden sm:block">
                <p class="text-[8px] text-slate-500 uppercase tracking-tighter">Connection Secure</p>
                <p class="text-xs text-indigo-400 font-bold tracking-widest">SSL_AES_256_GCM</p>
            </div>
            <button class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-6 py-2 rounded transition-all shadow-[0_0_20px_rgba(79,70,229,0.4)]">SYNC LINK</button>
        </div>
    </header>

    <main class="grid grid-cols-12 gap-6 relative z-10">
        <div class="col-span-12 lg:col-span-9 space-y-6">
            
            <section class="border border-indigo-500/30 bg-indigo-950/10 p-6 rounded-3xl border-glow relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-20 text-[60px] font-black italic">CORE</div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="flex flex-col justify-center border-r border-slate-800/50 pr-4">
                        <span class="text-[10px] text-indigo-400 mb-1">CORE FREQUENCY</span>
                        <div class="text-4xl font-bold text-white tracking-tighter"><span id="freq">432.10</span> <span class="text-sm text-slate-500 text-slate-500">Hz</span></div>
                        <div class="w-full bg-slate-900 h-1 mt-4 rounded-full overflow-hidden">
                            <div id="freq-bar" class="bg-indigo-500 h-full transition-all duration-500" style="width: 70%"></div>
                        </div>
                    </div>
                    <div class="flex flex-col justify-center items-center core-pulse">
                        <div class="relative w-32 h-32 flex items-center justify-center">
                            <div class="absolute inset-0 border-4 border-pink-600/20 rounded-full"></div>
                            <div class="absolute inset-2 border-2 border-indigo-500/40 rounded-full border-dashed animate-spin"></div>
                            <span class="text-4xl font-black text-white glow-pink">ACT</span>
                        </div>
                        <p class="text-[10px] mt-4 text-pink-500 font-bold tracking-[0.5em]">SYSTEM STABLE</p>
                    </div>
                    <div class="flex flex-col justify-center border-l border-slate-800/50 pl-4">
                        <span class="text-[10px] text-indigo-400 mb-1">DATA FLOW RATE</span>
                        <div class="text-4xl font-bold text-white tracking-tighter"><span id="flow">89.4</span> <span class="text-sm text-slate-500">GB/s</span></div>
                        <div class="flex gap-1 mt-4">
                            <div class="h-4 w-1 bg-indigo-500"></div><div class="h-4 w-1 bg-indigo-500"></div><div class="h-4 w-1 bg-indigo-800"></div><div class="h-4 w-1 bg-indigo-900"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="grid-container" class="grid grid-cols-4 md:grid-cols-8 gap-2">
                </section>
        </div>

        <div class="col-span-12 lg:col-span-3 space-y-6">
            <aside class="border border-slate-800 bg-black/40 rounded-2xl p-4 border-glow">
                <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-2 text-[10px] font-bold text-indigo-400 uppercase tracking-widest">
                    <span>Gateway Monitor</span>
                    <span id="load">16.0%</span>
                </div>
                <div id="log-console" class="h-64 font-mono text-[9px] overflow-y-auto space-y-2 text-slate-500">
                    <p class="text-green-500">>> CORE INITIALIZED</p>
                    <p>>> SYNCING NODES...</p>
                </div>
            </aside>
        </div>
    </main>

    <script>
        // ボタン生成
        const container = document.getElementById('grid-container');
        const rows = ['A','B','C','D','E','F','G','H'];
        rows.forEach(r => {
            for(let c=1; c<=8; c++) {
                const b = document.createElement('button');
                const id = r + c;
                b.className = id === 'A1' 
                    ? 'h-10 border border-indigo-400 bg-indigo-600 text-white text-[10px] rounded shadow-[0_0_15px_rgba(79,70,229,0.5)]'
                    : 'h-10 border border-slate-900 bg-slate-950 text-slate-700 text-[10px] rounded hover:border-slate-700 transition-colors';
                b.textContent = id;
                container.appendChild(b);
            }
        });

        // 動的演出
        setInterval(() => {
            document.getElementById('freq').textContent = (430 + Math.random() * 5).toFixed(2);
            document.getElementById('freq-bar').style.width = (60 + Math.random() * 20) + '%';
            document.getElementById('flow').textContent = (85 + Math.random() * 10).toFixed(1);
            document.getElementById('load').textContent = (15 + Math.random() * 3).toFixed(1) + '%';
            
            // ログの追加
            const console = document.getElementById('log-console');
            const p = document.createElement('p');
            p.textContent = `>> CORE_PING: ${Math.floor(Math.random()*100)}ms RECEIVED`;
            if(console.childNodes.length > 15) console.removeChild(console.firstChild);
            console.appendChild(p);
            console.scrollTop = console.scrollHeight;
        }, 2000);
    </script>
</body>
</html>
