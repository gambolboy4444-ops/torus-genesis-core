<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TG-CORE TUNNELING TEST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { font-family: 'Share Tech Mono', monospace; background-color: #020408; color: #94a3b8; overflow: hidden; }
        .glow-pink { text-shadow: 0 0 10px rgba(219, 39, 119, 0.7); }
        .tunnel-active { color: #4f46e5; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        #mobile-controller { display: none; }
        @media (max-width: 768px) { #pc-monitor { display: none; } #mobile-controller { display: block; } }
    </style>
</head>
<body>

    <div id="pc-monitor" class="p-8 h-screen flex flex-col">
        <header class="flex justify-between border-b border-slate-900 pb-4">
            <h1 class="text-3xl font-black italic text-pink-600 glow-pink">TORUS GENESIS <span class="text-white">CORE</span></h1>
            <div class="text-[10px] text-right">
                <p>STATUS: <span id="pc-status" class="text-slate-500">LISTENING...</span></p>
                <p class="text-indigo-500">ADDR: 127.0.0.1::TUNNEL</p>
            </div>
        </header>
        <main class="grid grid-cols-12 gap-6 mt-8 flex-grow">
            <div class="col-span-9 grid grid-cols-8 gap-2" id="node-grid"></div>
            <div class="col-span-3 bg-black/50 border border-slate-800 p-4 rounded-xl">
                <div id="pc-console" class="text-[9px] font-mono space-y-1">
                    <p class="text-green-500">>> CORE SYSTEM READY.</p>
                </div>
            </div>
        </main>
    </div>

    <div id="mobile-controller" class="p-6 h-screen flex flex-col bg-slate-950">
        <div class="border border-indigo-500/30 p-4 rounded-2xl mb-10 text-center">
            <h2 class="text-indigo-400 font-bold tracking-widest text-sm">TUNNELING TERMINAL</h2>
            <p id="m-status" class="text-[9px] text-slate-600 mt-2">LINK READY</p>
        </div>
        <button onclick="executeTunneling()" class="flex-grow bg-indigo-600 text-white font-black rounded-3xl shadow-[0_0_50px_rgba(79,70,229,0.4)] active:scale-95 text-xl tracking-[0.2em]">EXECUTE TUNNEL</button>
        <p class="text-[8px] text-center mt-6 text-slate-700 uppercase italic">Authorized access only</p>
    </div>

    <script>
        const pcConsole = document.getElementById('pc-console');
        const pcStatus = document.getElementById('pc-status');

        // PC側グリッド生成
        const grid = document.getElementById('node-grid');
        if(grid) {
            for(let i=0; i<64; i++) {
                const n = document.createElement('div');
                n.id = 'n-' + i;
                n.className = 'h-12 border border-slate-900 bg-slate-950/50 rounded flex items-center justify-center text-[8px] text-slate-800 transition-all duration-300';
                n.textContent = 'NODE_' + i;
                grid.appendChild(n);
            }
        }

        function addLog(msg, color='text-slate-500') {
            const p = document.createElement('p');
            p.className = color;
            p.textContent = `>> ${msg}`;
            pcConsole.appendChild(p);
            pcConsole.scrollTop = pcConsole.scrollHeight;
        }

        // トンネリング実演シーケンス
        function executeTunneling() {
            // スマホ側の表示
            const mStatus = document.getElementById('m-status');
            mStatus.textContent = 'TRANSMITTING...';
            mStatus.className = 'tunnel-active text-[9px]';

            // 本来はここからPCに信号を飛ばしますが、今は同一URLによる「実演」として
            // PCで見ている場合に備え、ブラウザ上の動作として同期演出を行います
            if(window.innerWidth > 768) {
                pcStatus.textContent = 'TUNNELING...';
                pcStatus.className = 'tunnel-active';
                addLog('INCOMING SIGNAL DETECTED', 'text-indigo-400');
                
                let i = 0;
                const interval = setInterval(() => {
                    if(i < 64) {
                        const node = document.getElementById('n-'+i);
                        node.className = 'h-12 border border-indigo-500 bg-indigo-900/40 rounded flex items-center justify-center text-[8px] text-white shadow-[0_0_10px_rgba(79,70,229,0.5)]';
                        addLog(`SYNCING NODE_${i}...`, 'text-indigo-500');
                        i++;
                    } else {
                        clearInterval(interval);
                        pcStatus.textContent = 'CONNECTED';
                        pcStatus.className = 'text-green-500 font-black';
                        addLog('TUNNEL ESTABLISHED: CORE ACCESS GRANTED', 'text-green-400 font-bold');
                    }
                }, 30);
            }
        }
    </script>
</body>
</html>
