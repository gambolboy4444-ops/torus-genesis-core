<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORUS GENESIS CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { font-family: 'Share Tech Mono', monospace; background-color: #020408; color: #94a3b8; }
        .glow-text { text-shadow: 0 0 10px rgba(219, 39, 119, 0.7); }
        .glow-green { text-shadow: 0 0 10px rgba(34, 197, 94, 0.7); box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
        .glow-red { text-shadow: 0 0 10px rgba(239, 68, 68, 0.7); box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
    <header class="flex flex-wrap justify-between items-center mb-8 border-b border-slate-900 pb-4 gap-4">
        <div class="flex items-center gap-6">
            <h1 class="text-3xl font-black italic tracking-tighter text-pink-600 glow-text">TORUS <span class="text-white">GENESIS</span> <span class="text-indigo-500 text-sm tracking-widest ml-1">CORE</span></h1>
            <div class="hidden md:flex gap-2 text-[10px]">
                <span class="bg-blue-900/20 text-blue-400 border border-blue-800/50 px-2 py-1 rounded">NETWORK: GLOBAL_REST_GATEWAY</span>
                <span class="bg-green-900/20 text-green-400 border border-green-800/50 px-2 py-1 rounded animate-pulse">STATUS: ACTIVE</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-xs text-slate-600 border border-slate-800 px-3 py-1 rounded-full bg-black">wss://torus-genesis-core.vercel.app</span>
            <button class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-5 py-2 rounded transition-all">SYNC LINK</button>
        </div>
    </header>

    <main class="grid grid-cols-12 gap-6">
        <div class="col-span-12 lg:col-span-9 space-y-6">
            <section class="border border-slate-800 bg-slate-950/40 p-6 rounded-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-[10px] tracking-[0.4em] font-bold text-slate-500 uppercase">Torus Core Pipeline</h2>
                    <div class="w-48 h-1 bg-slate-900 rounded-full overflow-hidden"><div class="w-2/3 h-full bg-indigo-500"></div></div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="h-28 border border-slate-800/50 rounded-xl bg-black/40 flex flex-col items-center justify-center group hover:border-indigo-500 transition-all">
                        <span class="text-[10px] text-slate-600 group-hover:text-indigo-400 uppercase">Loop</span>
                        <div class="w-8 h-[1px] bg-slate-800 mt-2"></div>
                    </div>
                    <div class="h-28 border border-slate-800/50 rounded-xl bg-black/40 flex flex-col items-center justify-center group hover:border-indigo-500 transition-all">
                        <span class="text-[10px] text-slate-600 group-hover:text-indigo-400 uppercase">Loop</span>
                        <div class="w-8 h-[1px] bg-slate-800 mt-2"></div>
                    </div>
                    <div class="h-28 border border-slate-800/50 rounded-xl bg-black/40 flex flex-col items-center justify-center group hover:border-pink-500 transition-all">
                        <span class="text-[10px] text-slate-600 group-hover:text-pink-400 uppercase">Cash</span>
                        <div class="w-8 h-[1px] bg-slate-800 mt-2"></div>
                    </div>
                    <div class="h-28 border border-slate-800/50 rounded-xl bg-black/40 flex flex-col items-center justify-center group hover:border-pink-500 transition-all">
                        <span class="text-[10px] text-slate-600 group-hover:text-pink-400 uppercase">Cash</span>
                        <div class="w-8 h-[1px] bg-slate-800 mt-2"></div>
                    </div>
                </div>
            </section>
            <section id="grid-container" class="grid grid-cols-4 md:grid-cols-8 gap-2"></section>
        </div>

        <div class="col-span-12 lg:col-span-3 space-y-6">
            <div class="grid grid-cols-2 gap-2">
                <button class="py-4 bg-green-950/30 border border-green-500/50 text-green-500 text-[10px] font-bold rounded-xl glow-green hover:bg-green-500 hover:text-white transition-all">START SYSTEM</button>
                <button class="py-4 bg-red-950/30 border border-red-500/50 text-red-500 text-[10px] font-bold rounded-xl glow-red hover:bg-red-500 hover:text-white transition-all">RESET CORE</button>
            </div>

            <aside class="border border-slate-800 bg-slate-950/40 rounded-2xl p-4 h-80 flex flex-col">
                <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-2">
                    <span class="text-[10px] font-bold uppercase">Gateway Monitor</span>
                    <span class="text-indigo-400 text-[10px]">16.0%</span>
                </div>
                <div id="console" class="flex-grow font-mono text-[10px] overflow-y-auto">
                    <p class="text-green-500 mb-2">RECEIVE 04:34:40</p>
                    <p class="text-slate-300">[SYSTEM] Genesis Core Active. Waiting for command...<span class="inline-block w-2 h-4 bg-white animate-pulse ml-1 align-middle"></span></p>
                </div>
            </aside>
        </div>
    </main>

    <script>
        const container = document.getElementById('grid-container');
        const rows = ['A','B','C','D','E','F','G','H'];
        rows.forEach(r => {
            for(let c=1; c<=8; c++) {
                const b = document.createElement('button');
                const id = r + c;
                b.className = id === 'A1' 
                    ? 'h-10 border border-indigo-400 bg-indigo-600 text-white text-[10px] rounded shadow-[0_0_15px_rgba(79,70,229,0.5)]'
                    : 'h-10 border border-slate-900 bg-slate-950 text-slate-700 text-[10px] rounded hover:border-slate-700';
                b.textContent = id;
                container.appendChild(b);
            }
        });
    </script>
</body>
</html>
